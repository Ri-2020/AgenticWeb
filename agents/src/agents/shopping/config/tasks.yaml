extract_requirements:
  description: >
    Analyze the user's request: "{user_query}" and extract a structured
    list of product requirements.

    Convert the request into a JSON list where each item contains:

    - product: the type of item requested
    - description: a short explanation of the user's need
    - constraints: a dictionary of relevant requirements
      (for example size, color, power, budget, material, brand preference etc.)

    Only include constraints that are relevant to the product.

    Example output:

    [
      {
        "product": "air cooler",
        "description": "cooler suitable for a small room in a very hot climate",
        "constraints": {
          "room_size": "small",
          "cooling_power": "high"
        }
      }
    ]
  expected_output: >
    A valid JSON list of product requirement objects.
  agent: requirement_extractor

build_search_queries:
  description: >
    Using the structured product requirements, generate search queries
    for each product. Queries should describe the product itself,
    not the user scenario.

    Return results in JSON format where each product has a list of queries.

    Example:

    {
      "air cooler": [
        "site:amazon.in air cooler small room",
        "site:flipkart.com compact air cooler small room"
      ]
    }
  expected_output: >
    A JSON object mapping each product to a list of search queries.
  agent: query_builder

search_marketplace:
  description: >
    Use the search tool to find products for EVERY product category.

    The input will contain a JSON object where each product has a list of search queries.

    You must:
    1. Iterate through each product.
    2. Run the search tool for EVERY query.
    3. Collect product results separately for each product category.

    Continue searching until all products have results.
    Do NOT stop after the first successful search.

    Return results grouped by product.

    Example output:

    {
      "peanut butter": [
        {"title": "...", "url": "..."}
      ]
    }
  expected_output: >
    JSON object containing product search results for every product requirement.
  agent: marketplace_searcher

analyze_products:
  description: >
    For each product candidate URL, use the product_page_scraper tool
    to extract product information.

    Then compare products based on:
    - features
    - rating
    - price
    - match with requirements
  expected_output: >
    Ranked product list with extracted details.
  agent: product_analyst

generate_recommendations:
  description: >
    Create the final recommendation list.

    For each product requirement provide:
    - Best match product
    - Two alternative products
    - product name
    - price
    - url
    - short reason why it matches the requirement

    Return the output as a JSON object matching this schema:
    {
      "recommendations": [
        {
          "category": "product category name",
          "best_match": {
            "product_name": "...",
            "price": "...",
            "url": "...",
            "reason": "..."
          },
          "alternatives": [
            {
              "product_name": "...",
              "price": "...",
              "url": "...",
              "reason": "..."
            }
          ]
        }
      ]
    }
  expected_output: >
    A JSON object with a "recommendations" array containing category-wise
    best match and alternative products.
  output_json: RecommendationsOutput
  agent: recommendation_generator
